services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: egx-analyst-api
    command: ["uvicorn", "api.main:app", "--host", "0.0.0.0", "--port", "8000"]
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      # Retrained models / refreshed data get picked up without rebuilding the image
      - ./models:/app/models
      - ./data:/app/data
    restart: unless-stopped
    networks:
      - egx-net

  ui:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: egx-analyst-ui
    command: ["streamlit", "run", "ui/app.py", "--server.port=8501", "--server.address=0.0.0.0"]
    ports:
      - "8501:8501"
    environment:
      - API_BASE_URL=http://api:8000
      - EGX_API_URL=http://api:8000
    env_file:
      - .env
    volumes:
      - ./models:/app/models
      - ./data:/app/data
    depends_on:
      - api
    restart: unless-stopped
    networks:
      - egx-net

networks:
  egx-net:
    driver: bridge
